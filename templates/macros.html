{% macro render_caixa(caixa) %}
  <div class="bg-white shadow-md rounded-xl p-4 border border-purple-200" data-busca="{{ caixa.cto }} {{ caixa.regiao }} {{ caixa.problema }}">
    <div class="flex justify-between items-center">
      <div>
        <h2 class="text-lg font-semibold text-purple-800">REGIÃO: {{ caixa.regiao }}</h2>
        <p class="text-gray-600">CTO: <span class="font-medium text-blue-600">{{ caixa.cto }}</span></p>
      </div>
      <button 
        class="text-purple-600 text-2xl focus:outline-none" 
        onclick="toggleDetalhes(this)">
        ⬇️
      </button>
    </div>

    <div class="detalhes hidden mt-4 text-sm space-y-1">
      <p><strong>Problema:</strong> {{ caixa.problema }}</p>
      <p><strong>Clientes:</strong> {{ caixa.clientes }}</p>
      <p><strong>Obs:</strong> {{ caixa.obs }}</p>
      <p><strong>Protocolo:</strong> {{ caixa.protocolo }}, <strong>Previsão:</strong> {{ caixa.previsao }}</p>

      <div class="mt-3 flex justify-between items-center">
        <button
          class="bg-purple-600 hover:bg-purple-700 text-white text-sm px-4 py-2 rounded"
          onclick="forcarUpdate('{{ caixa.cto }}')"
        >
          Forçar Update
        </button>
        <span class="text-xs text-gray-400">{{ caixa.data }}</span>
      </div>
    </div>
  </div>
{% endmacro %}
