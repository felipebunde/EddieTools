<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <link rel="icon" href="{{ url_for('static', filename='icon.png') }}" type="image/png">
  <link rel="shortcut icon" href="{{ url_for('static', filename='icon.png') }}" type="image/png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- ESSENCIAL PARA CELULAR -->
  <link rel="icon" type="image/png" href="/backend/static/icon.png">
  <title>EddieTools | Login</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

  <style>
    body {
      background: linear-gradient(135deg, #550b6f, #ff8100);
      font-family: 'Arial', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-box {
      background: white;
      padding: 2rem;
      border-radius: 1rem;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
    }

    .login-title {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .login-title img {
      width: 80px;
      height: 80px;
    }

    .h3-login {
      color: #ff6f00;
      font-weight: bold;
      font-size: 36px;
      margin: 0;
      line-height: 1;
    }

    .h3-login2 {
      color: #550b6f;
      font-size: 18px;
      margin-top: -5px;
    }

    .form-control {
      margin-bottom: 1rem;
      font-size: 0.95rem;
    }

    .btn-login {
      background-color: #550b6f;
      border: none;
      width: 100%;
      padding: 0.6rem;
      font-size: 1rem;
    }

    .btn-login:hover {
      background-color: #6b2c87;
    }

    .error {
      color: red;
      font-weight: bold;
      text-align: center;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>

  <div class="login-box">
    <div class="login-title">
      <img src="{{ url_for('static', filename='icon.png') }}" alt="Logo EdyAssist">
      <h3 class="h3-login">Eddie</h3>
      <h3 class="h3-login2">Tools</h3>
    </div>

    <form method="POST" action="/login_form">
      <input type="text" name="nome" class="form-control" placeholder="Login" required />
      <input type="password" name="senha" class="form-control" placeholder="Senha" required />
      {% if erro %}
      <div class="error">{{ erro }}</div>
      {% endif %}
      <button type="submit" class="btn btn-login text-white">Entrar</button>
    </form>
  </div>

</body>

</html>
