<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Editar Usuário</title>
  <link rel="icon" href="{{ url_for('static', filename='icon.png') }}" type="image/png">
  <script src="https://cdn.tailwindcss.com"></script>

<style>
  /* ====== FUNDO ANIMADO ====== */
  body {
    background: linear-gradient(135deg, #5B00B3, #7A1CAC, #FF7A00);
    background-size: 200% 200%;
    animation: gradientMove 12s ease infinite;
    font-family: 'Segoe UI', sans-serif;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    overflow: hidden;
  }

  @keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* ====== CONTAINER DO FORM ====== */
  .form-container {
    width: 100%;
    max-width: 440px;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(12px);
    border-radius: 24px;
    padding: 30px;
    box-shadow: 0 0 25px rgba(0,0,0,0.25);
    text-align: center;
  }

  /* ====== TÍTULOS ====== */
  h1 {
    color: #fff;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-size: 1.6rem;
    margin-bottom: 15px;
  }

  /* ====== LABELS ====== */
  label {
    display: block;
    font-size: 14px;
    font-weight: 500;
    color: #fff;
    margin-bottom: 6px;
    text-align: left;
  }

  /* ====== INPUTS E SELECTS ====== */
  input, select {
    width: 100%;
    padding: 10px 12px;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.25);
    background: rgba(255,255,255,0.15);
    color: #fff;
    outline: none;
    transition: all 0.25s ease;
    font-size: 14px;
  }

  input:focus, select:focus {
    background: rgba(255,255,255,0.25);
    border-color: #FF7A00;
    box-shadow: 0 0 0 2px rgba(255,122,0,0.4);
  }

  ::placeholder {
    color: rgba(255,255,255,0.6);
  }

  /* ====== DROPDOWN ESTILIZADA ====== */
  select {
    appearance: none;
    -webkit-appearance: none;
    -moz-appearance: none;
    background: linear-gradient(135deg, #6A00B5, #FF7A00);
    color: #fff;
    font-weight: 500;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    padding: 10px 12px;
    width: 100%;
    cursor: pointer;
    transition: all 0.3s ease;
    background-image: url("data:image/svg+xml,%3Csvg width='16' height='16' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath fill='%23ffffff' d='M4 6l4 4 4-4z'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 10px center;
    background-size: 12px;
  }

  select:focus {
    outline: none;
    border-color: #FF7A00;
    box-shadow: 0 0 0 2px rgba(255,122,0,0.5);
  }

  option {
    background: #4B0082;
    color: #fff;
  }

  option:hover {
    background-color: #FF7A00;
    color: #fff;
  }

  /* ====== BOTÕES ====== */
  .btn {
    padding: 10px 18px;
    border-radius: 10px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s;
    border: none;
    font-size: 14px;
  }

  .btn-orange {
    background: linear-gradient(135deg, #FF7A00, #FF9A3E);
    color: #fff;
    box-shadow: 0 0 10px rgba(255,122,0,0.3);
  }

  .btn-orange:hover {
    background: linear-gradient(135deg, #FF962A, #FFB260);
    transform: scale(1.03);
  }

  .btn-gray {
    background: rgba(255,255,255,0.2);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.3);
  }

  .btn-gray:hover {
    background: rgba(255,255,255,0.35);
    transform: scale(1.02);
  }

  /* ====== AVATAR ====== */
  .avatar {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    border: 4px solid rgba(255,255,255,0.3);
    object-fit: cover;
    box-shadow: 0 0 15px rgba(0,0,0,0.3);
    margin-bottom: 6px;
  }

  .userid {
    font-size: 13px;
    opacity: 0.75;
    margin-bottom: 15px;
  }

  /* ====== ROLAGEM ====== */
  ::-webkit-scrollbar {
    width: 8px;
  }
  ::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.2);
    border-radius: 8px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: rgba(255,255,255,0.3);
  }
</style>


</head>

<body class="flex justify-center items-center h-[100vh] p-6">
  <div class="w-full max-w-lg bg-white/10 backdrop-blur-lg border border-white/20 rounded-3xl shadow-xl p-6 flex flex-col">
    <!-- Cabeçalho -->
    <div class="flex justify-between items-center mb-4">
      <h1 class="text-2xl font-bold flex items-center gap-2">
        ✏️ <span>Editar Usuário</span>
      </h1>
    </div>

    <!-- Avatar -->
    <div class="flex flex-col items-center mb-4">
      <img src="{{ url_for('static', filename=usuario['foto'] if usuario['foto'] else 'icon.png') }}"
           onerror="this.src='{{ url_for('static', filename='icon.png') }}';"
           class="w-20 h-20 rounded-full border-4 border-white/30 object-cover mb-2 shadow-lg">
      <span class="text-sm opacity-80">{{ usuario['id'] }}</span>
    </div>

    <!-- Formulário -->
    <form action="/editar_usuario/{{ usuario['id'] }}" method="POST" class="space-y-4 overflow-y-auto max-h-[60vh] pr-1">
      <div>
        <label class="block text-sm mb-1 font-medium">Nome</label>
        <input type="text" name="nome" value="{{ usuario['nome'] }}" required class="input-field">
      </div>

      <div>
        <label class="block text-sm mb-1 font-medium">Senha</label>
        <input type="password" name="senha" value="{{ usuario['senha'] }}" required class="input-field">
      </div>

      <div>
        <label class="block text-sm mb-1 font-medium">Setor</label>
        <select name="setor" id="setor" class="input-field" onchange="toggleFuncao()" required>
          <option value="suporte" {% if usuario['setor'] == 'suporte' %}selected{% endif %}>Suporte</option>
          <option value="infra" {% if usuario['setor'] == 'infra' %}selected{% endif %}>Infra</option>
          <option value="sac" {% if usuario['setor'] == 'sac' %}selected{% endif %}>SAC</option>
          <option value="cobranca" {% if usuario['setor'] == 'cobranca' %}selected{% endif %}>Cobrança</option>
          <option value="qualidade" {% if usuario['setor'] == 'qualidade' %}selected{% endif %}>Qualidade</option>
          <option value="retencao" {% if usuario['setor'] == 'retencao' %}selected{% endif %}>Retenção</option>
        </select>
      </div>

      <div id="campoFuncao">
        <label class="block text-sm mb-1 font-medium">Função</label>
        <select name="funcao" class="input-field">
          <option value="Auxiliar" {% if usuario['funcao'] == 'Auxiliar' %}selected{% endif %}>Auxiliar</option>
          <option value="N1" {% if usuario['funcao'] == 'N1' %}selected{% endif %}>N1</option>
          <option value="N2" {% if usuario['funcao'] == 'N2' %}selected{% endif %}>N2</option>
          <option value="Admin" {% if usuario['funcao'] == 'Admin' %}selected{% endif %}>Admin</option>
          <option value="sinos" {% if usuario['funcao'] == 'sinos' %}selected{% endif %}>Sinos</option>
          <option value="matriz" {% if usuario['funcao'] == 'matriz' %}selected{% endif %}>Matriz</option>
          <option value="litoral" {% if usuario['funcao'] == 'litoral' %}selected{% endif %}>Litoral</option>
        </select>
      </div>

      <!-- Botões -->
      <div class="flex justify-between items-center mt-6">
        <div class="text-right mt-6">
          <button type="submit" class="btn btn-orange">💾 Salvar Alterações</button>
        </div>
        
      </div>
    </form>
  </div>

  <script>
    function toggleFuncao() {
      const setor = document.getElementById('setor').value;
      const campoFuncao = document.getElementById('campoFuncao');
      campoFuncao.style.display = (setor === 'suporte' || setor === 'infra') ? 'block' : 'none';
    }
    window.onload = toggleFuncao;
  </script>
</body>
</html>
